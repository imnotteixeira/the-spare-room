version: '3.8'

services:
  # 1. This is a placeholder for your future web app
  homelab-frontend:
    image: nginx:alpine
    container_name: homelab-frontend
    restart: unless-stopped
    volumes:
      # This binds the index.html file in your current Windows directory 
      # to the default HTML folder inside the Nginx container
      - ./homelab-frontend/index.html:/usr/share/nginx/html/index.html:ro
   
  # 2. This is the Cloudflare Tunnel connector
  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-connector
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run

include:
  - split-pro/docker-compose.yml